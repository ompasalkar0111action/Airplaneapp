<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student DB</title>
  </head>
  <body>
    <h1>Student Database</h1>

    <h2>Add Student</h2>
    <form id="studentForm">
      RegNo: <input type="number" id="regno" required /><br />
      Mark: <input type="number" id="mark" required /><br />
      Grade: <input type="text" id="grade" required /><br />
      Result: <input type="text" id="result" required /><br />
      <button type="submit">Add Student</button>
    </form>

    <p id="message"></p>

    <h2>All Students</h2>
    <button onclick="fetchStudents()">Load Students</button>
    <ul id="studentList"></ul>

    <script>
      document
        .getElementById("studentForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const regno = document.getElementById("regno").value;
          const mark = document.getElementById("mark").value;
          const grade = document.getElementById("grade").value;
          const result = document.getElementById("result").value;
          const message = document.getElementById("message");

          const res = await fetch("/add", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ regno, mark, grade, result }),
          });

          const data = await res.json();

          if (res.ok) {
            message.textContent = data.message;
            e.target.reset();
            fetchStudents();
          } else {
            message.textContent = data.message || "Failed to add student";
          }
        });

      async function fetchStudents() {
        const res = await fetch("/students");
        const students = await res.json();
        const list = document.getElementById("studentList");
        list.innerHTML = "";

        if (!res.ok) {
          list.innerHTML = `<li>${students.message || "Failed to load students"}</li>`;
          return;
        }

        students.forEach((s) => {
          const li = document.createElement("li");
          li.textContent = `RegNo: ${s.regno}, Mark: ${s.mark}, Grade: ${s.grade}, Result: ${s.result}`;
          list.appendChild(li);
        });
      }
    </script>
  </body>
</html>
